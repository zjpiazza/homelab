creation_rules:
  # Files whose name ends in `.sops.yaml` with at least one preceding
  # character (e.g. cloudflared.sops.yaml) are encrypted. The leading
  # `.+` excludes the bare `.sops.yaml` config file at the repo root.
  - path_regex: .+\.sops\.yaml$
    encrypted_regex: ^(data|stringData)$
    age: age1swfkes9cealehclknyt350m8lj7faw3xwvnx3mllr28xeekq3vyqe8545h
