apiVersion: ceph.rook.io/v1
kind: CephCluster
metadata:
  name: rook-ceph
  namespace: rook-ceph
spec:
  dataDirHostPath: /var/lib/rook
  cephVersion:
    image: quay.io/ceph/ceph:v19.2.3
  mon:
    count: 3
    allowMultiplePerNode: false
  mgr:
    count: 2
    modules:
      - name: rook
        enabled: true
  dashboard:
    enabled: true
    ssl: true
  crashCollector:
    disable: false
  logCollector:
    enabled: true
    periodicity: daily
    maxLogSize: 500M
  storage:
    useAllNodes: true
    useAllDevices: false
    config:
      osdsPerDevice: "1"
    nodes:
      - name: nova
        directories:
          - path: /var/lib/rook/osd1
      - name: orbit
        directories:
          - path: /var/lib/rook/osd1
      - name: comet
        directories:
          - path: /var/lib/rook/osd1
  disruptionManagement:
    managePodBudgets: true
    osdMaintenanceTimeout: 30
  priorityClassNames:
    mon: system-node-critical
    osd: system-node-critical
    mgr: system-cluster-critical
  healthCheck:
    daemonHealth:
      mon:
        interval: 45s
