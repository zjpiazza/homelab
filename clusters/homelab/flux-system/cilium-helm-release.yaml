apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cilium
  namespace: flux-system
spec:
  interval: 15m
  chart:
    spec:
      chart: cilium
      sourceRef:
        kind: HelmRepository
        name: cilium
        namespace: flux-system
      interval: 1h
  values:
    ipam:
      mode: kubernetes
    k8sServiceHost: 192.168.1.240
    k8sServicePort: 6443
    rollOutCiliumPods: true
    operator:
      replicas: 1
