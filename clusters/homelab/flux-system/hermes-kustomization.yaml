apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: hermes
  namespace: flux-system
spec:
  interval: 10m0s
  dependsOn:
    - name: flux-system
    - name: rook-ceph
  path: ./clusters/homelab/hermes
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
