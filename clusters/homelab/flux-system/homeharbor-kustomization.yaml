apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: homeharbor
  namespace: flux-system
spec:
  interval: 10m0s
  dependsOn:
    - name: flux-system
    - name: rook-ceph
  path: ./apps/envs/prod/homeharbor
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  decryption:
    provider: sops
    secretRef:
      name: sops-age
      namespace: flux-system
