apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: hermes
  namespace: hermes
spec:
  interval: 15m
  timeout: 10m
  targetNamespace: hermes
  releaseName: hermes
  chart:
    spec:
      # Chart lives at the repo root; no chart name is needed when using
      # a GitRepository source pointed at a single chart, but the field is
      # required by the schema, so we pass the chart directory ("."):
      chart: "."
      sourceRef:
        kind: GitRepository
        name: hermes-agent-helm-chart
        namespace: flux-system
      reconcileStrategy: Revision
  install:
    crds: CreateReplace
    remediation:
      retries: 2
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 2
  values:
    # --- State safety (chart defaults; kept explicit for clarity) ---
    replicaCount: 1
    strategy:
      type: Recreate

    image:
      repository: nousresearch/hermes-agent
      tag: "sha-9ed751b96706ffd343ae26531cd0e2152a1c7036"
      pullPolicy: IfNotPresent

    # --- Secrets: managed out-of-band via kubectl ---
    # Create / update with:
    #   kubectl -n hermes create secret generic hermes-secrets \
    #     --from-literal=OPENROUTER_API_KEY=sk-or-... \
    #     --from-literal=TELEGRAM_BOT_TOKEN=123456:ABC... \
    #     --dry-run=client -o yaml | kubectl apply -f -
    # The chart wires every key in this Secret onto the pod as an env var
    # via envFrom, so adding a new key + restarting the pod is enough.
    secrets:
      existingSecret: hermes-secrets

    # --- Messaging platform allowlists & runtime env ---
    # Telegram auto-enables when TELEGRAM_BOT_TOKEN is set in the Secret.
    # We must override the chart default env map (not use extraEnv) because
    # Kubernetes server-side apply rejects duplicate env keys, and the
    # chart already renders TELEGRAM_ALLOWED_USERS="" from its defaults.
    # When overriding env, the full map replaces the chart defaults, so
    # re-list every key we care about keeping.
    env:
      WEB_TOOLS_DEBUG: "false"
      VISION_TOOLS_DEBUG: "false"
      MOA_TOOLS_DEBUG: "false"
      IMAGE_TOOLS_DEBUG: "false"
      HERMES_HUMAN_DELAY_MODE: "off"
      HERMES_HUMAN_DELAY_MIN_MS: "800"
      HERMES_HUMAN_DELAY_MAX_MS: "2500"
      GATEWAY_ALLOW_ALL_USERS: "false"
      WHATSAPP_ENABLED: "false"
      WHATSAPP_ALLOWED_USERS: ""
      TELEGRAM_ALLOWED_USERS: "6786828227"
      TELEGRAM_HOME_CHANNEL: ""
      DISCORD_ALLOWED_USERS: ""
      DISCORD_HOME_CHANNEL: ""
      SLACK_ALLOWED_USERS: ""
      SIGNAL_ALLOWED_USERS: ""
      SIGNAL_GROUP_ALLOWED_USERS: ""
      # Tell Python to find messaging-platform packages installed by the
      # install-messaging-deps initContainer below into the PVC. The
      # upstream image deliberately excludes messaging deps from its
      # [all] extras group (see hermes-agent pyproject.toml comment dated
      # 2026-05-12), and the gateway's Telegram adapter import path does
      # NOT invoke tools/lazy_deps.ensure() -- so without this, Telegram
      # silently disables with "python-telegram-bot not installed".
      PYTHONPATH: "/opt/data/python-packages"

    # --- Install messaging platform Python deps into the PVC ---
    # Idempotent: uv pip install --target is a no-op when packages are
    # already present at the matching version. Re-runs only when the PVC
    # is fresh or the spec version below changes.
    extraInitContainers:
      - name: install-messaging-deps
        image: nousresearch/hermes-agent:sha-9ed751b96706ffd343ae26531cd0e2152a1c7036
        imagePullPolicy: IfNotPresent
        command: ["/bin/sh", "-ec"]
        args:
          - |
            set -eu
            TARGET=/opt/data/python-packages
            mkdir -p "$TARGET"
            # --target installs into a directory rather than a venv.
            # --system flag tells uv not to require an active venv.
            uv pip install --system --target "$TARGET" \
              "python-telegram-bot[webhooks]==22.6"
            echo "Installed messaging deps to $TARGET:"
            ls "$TARGET" | head -20
        env:
          - name: HOME
            value: /opt/data/home
        volumeMounts:
          - name: data
            mountPath: /opt/data
          - name: tmp
            mountPath: /tmp
        securityContext:
          runAsUser: 10000
          runAsGroup: 10000

    # --- Persistence via Rook-Ceph block storage ---
    persistence:
      enabled: true
      mountPath: /opt/data
      accessMode: ReadWriteOnce
      size: 20Gi
      storageClass: rook-ceph-block

    # --- Hermes runtime config ---
    config:
      values:
        model:
          default: anthropic/claude-opus-4.6
          provider: auto
          base_url: https://openrouter.ai/api/v1
        agent:
          max_turns: 90
          gateway_timeout: 1800
          restart_drain_timeout: 60
          tool_use_enforcement: auto
        terminal:
          backend: local
          cwd: .
          timeout: 180
        compression:
          enabled: true
        security:
          redact_secrets: true

    # --- Resources sized for parallel subagent workloads ---
    resources:
      requests:
        cpu: "1"
        memory: 2Gi
      limits:
        cpu: "4"
        memory: 8Gi

    browser:
      shm:
        enabled: true
        sizeLimit: 2Gi

    # --- No external exposure for now ---
    service:
      enabled: false
    ingress:
      enabled: false
    virtualService:
      enabled: false

    # --- Default to gateway mode (chart default args: gateway run) ---
    apiServer:
      enabled: false
    webhook:
      enabled: false
    telegramWebhook:
      enabled: false
