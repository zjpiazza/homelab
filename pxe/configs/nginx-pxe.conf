server {
    listen 80;
    server_name _;

    root /srv/http;

    # CORS headers for iPXE
    add_header Access-Control-Allow-Origin *;

    # Talos boot assets
    location /talos/ {
        autoindex on;
    }

    # iPXE boot script
    location /pxe/ {
        autoindex on;
    }

    # Talos machine configuration endpoint (future use)
    location /config/ {
        autoindex off;
    }

    # Default — serve static files
    location / {
        try_files $uri $uri/ =404;
    }
}
