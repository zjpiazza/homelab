apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: homeharbor
resources:
  - ../../../base/homeharbor
  - values-secrets.sops.yaml
generatorOptions:
  disableNameSuffixHash: true
configMapGenerator:
  - name: homeharbor-values
    behavior: create
    files:
      - values.yaml
