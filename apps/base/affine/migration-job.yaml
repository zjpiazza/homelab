# AFFiNE database migration job.
#
# Runs `node ./scripts/self-host-predeploy.js` exactly like the
# `affine_migration` service in upstream docker-compose. The Deployment
# below does NOT depend on this Job through any Kubernetes-native mechanism
# (Job-as-dependency in vanilla K8s requires init containers or a controller);
# instead the Deployment includes the same migration command as an
# initContainer, so this Job is also useful as a one-shot CLI for re-running
# migrations after upgrades.
#
# `ttlSecondsAfterFinished` cleans the pod up so reruns (e.g. after a Flux
# revision bump) succeed without a manual delete.
apiVersion: batch/v1
kind: Job
metadata:
  name: affine-migration
  namespace: affine
  annotations:
    # Re-run only when this annotation changes. Flux replaces the Job on
    # revision changes; bump this manually for on-demand reruns.
    homelab.local/migration-revision: "1"
spec:
  ttlSecondsAfterFinished: 600
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: affine-migration
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migration
          image: ghcr.io/toeverything/affine:stable
          command: ["sh", "-c", "node ./scripts/self-host-predeploy.js"]
          env:
            - name: REDIS_SERVER_HOST
              value: affine-redis
            - name: AFFINE_INDEXER_ENABLED
              value: "false"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: affine-pg-app
                  key: uri
          volumeMounts:
            - name: config
              mountPath: /root/.affine/config
            - name: storage
              mountPath: /root/.affine/storage
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: affine-config
        - name: storage
          persistentVolumeClaim:
            claimName: affine-storage
